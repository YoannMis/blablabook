services:
  blablabook-db:
    image: postgres:${PG_VERSION}
    restart: unless-stopped
    networks:
      - blablabook-network
    volumes:
      - blablabook-db-volume:/var/lib/postgresql/${PG_VERSION}/docker
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5

  blablabook-back:
    build:
      context: ./back
      dockerfile: Dockerfile
      args:
        - DATABASE_URL=${DATABASE_URL}
    restart: unless-stopped
    environment:
      PORT: ${BACKEND_LOCAL_PORT}
      DATABASE_URL: 'postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@blablabook-db:5432/${POSTGRES_DB}'
      CORS_ORIGIN: ${CORS_ORIGIN}
      NODE_ENV: ${NODE_ENV}
      GOOGLE_BOOKS_API_BASE_URL: ${GOOGLE_BOOKS_API_BASE_URL}
      GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN}
    ports:
      - ${BACKEND_LOCAL_PORT}:${BACKEND_LOCAL_PORT}
    networks:
      - blablabook-network
    depends_on:
      blablabook-db:
        condition: service_healthy
    volumes:
      - ./back/prisma/migrations:/app/prisma/migrations:ro

  blablabook-front:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    environment:
      VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    ports:
      - ${HTTP_PORT}:80
      - ${HTTPS_PORT}:443
    networks:
      - blablabook-network
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro

networks:
  blablabook-network:

volumes:
  blablabook-db-volume:
