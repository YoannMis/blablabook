services:
  blablabook-db:
    image: postgres:${PG_VERSION}
    restart: unless-stopped
    networks:
      - blablabook-network
    volumes:
      - blablabook-db-volume:/var/lib/postgresql/${PG_VERSION}/docker
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - ${POSTGRES_PORT}:5432
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - ${ADMINER_PORT}:8080
    depends_on:
      - blablabook-db
    networks:
      - blablabook-network

networks:
  blablabook-network:

volumes:
  blablabook-db-volume:
